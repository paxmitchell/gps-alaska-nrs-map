<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS Alaska | TopNet Live Coverage Map</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #091423;
      --panel: rgba(8, 20, 35, 0.66);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #eef4ff;
      --muted: rgba(238, 244, 255, 0.74);
      --brand: #2d7ddf;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    .panel {
      position: absolute;
      z-index: 3;
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .title-card {
      top: 18px;
      left: 18px;
      width: min(420px, calc(100vw - 36px));
      padding: 18px 18px 16px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, rgba(45,125,223,0.24), rgba(45,125,223,0.10));
      border: 1px solid rgba(255,255,255,0.1);
      flex: 0 0 auto;
    }

    .brand-mark svg {
      width: 24px;
      height: 24px;
      fill: var(--brand);
    }

    .legend-dropdown {
      margin-top: 10px;
    }

    .legend-dropdown summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      font-weight: 650;
      font-size: 14px;
      color: var(--text);
      user-select: none;
    }

    .legend-dropdown summary::-webkit-details-marker {
      display: none;
    }

    .legend-chevron {
      display: inline-block;
      transition: transform 180ms ease;
      font-size: 14px;
      color: var(--muted);
    }

    .legend-dropdown[open] .legend-chevron {
      transform: rotate(180deg);
    }

    .legend-content {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(238,244,255,0.82);
      display: grid;
      gap: 8px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      flex: 0 0 auto;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 32px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .legend {
      top: 18px;
      right: 18px;
      width: min(285px, calc(100vw - 36px));
      padding: 16px;
    }

    .legend h2 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .legend-item {
      display: grid;
      grid-template-columns: 16px 1fr;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .swatch.green { background: rgba(48, 165, 78, 0.88); }
    .swatch.yellow { background: rgba(220, 192, 73, 0.84); }
    .swatch.orange { background: linear-gradient(135deg, rgba(231,152,73,0.88), rgba(198,82,48,0.88)); }
    .swatch.pin { background: rgba(18,18,18,0.92); }

    .footer-chip {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 3;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(8, 20, 35, 0.62);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      font-size: 12px;
      color: var(--muted);
      box-shadow: var(--shadow);
    }

    .mapboxgl-popup-content {
      background: rgba(10, 24, 40, 0.84);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 12px 14px;
    }

    .mapboxgl-popup-close-button {
      color: rgba(255,255,255,0.72);
      font-size: 18px;
      padding-right: 6px;
    }

    .popup-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .popup-copy {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    @media (max-width: 760px) {
      .title-card {
        width: calc(100vw - 24px);
        top: 12px;
        left: 12px;
      }

      .legend {
        top: auto;
        right: 12px;
        left: 12px;
        bottom: 58px;
        width: auto;
      }

      .footer-chip {
        left: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel title-card">

  <div class="brand-row">
    <div class="brand-mark">
      <img src="tower-icon.png" style="width:26px;height:26px;">
    </div>

    <div>
      <div class="eyebrow">TOPCON</div>
      <h1>TopNet Live Coverage Map</h1>
    </div>
  </div>

  <details class="legend-dropdown">
    <summary>
      <span>Coverage Bands</span>
      <span class="legend-chevron">⌄</span>
    </summary>

    <div class="legend-content">
      <div class="legend-row">
        <span class="legend-dot" style="background:#2fb35b;"></span>
        ± less than 0.1 inch
      </div>

      <div class="legend-row">
        <span class="legend-dot" style="background:#e4c94f;"></span>
        ± 0.1–0.2 inch
      </div>

      <div class="legend-row">
        <span class="legend-dot" style="background:#e16b3f;"></span>
        ± 0.3+ inch
      </div>
    </div>

  </details>

</div>

  

  

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoicGF4bWl0Y2hlbGwiLCJhIjoiY21taTN5Y21mMTJzYzJxb2Z6YW9oZW0yMCJ9.SdMEae4Sxirm4QsWpCLKCw';

    const stations = [
      { id: 1,  name: 'NRS-01',  coordinates: [-151.864509, 59.770639] },
      { id: 2,  name: 'NRS-02',  coordinates: [-148.331723, 61.80708] },
      { id: 3,  name: 'NRS-03',  coordinates: [-149.352479, 60.929208] },
      { id: 4,  name: 'NRS-04',  coordinates: [-150.068927, 61.768974] },
      { id: 5,  name: 'NRS-05',  coordinates: [-149.874824, 61.173246] },
      { id: 6,  name: 'NRS-06',  coordinates: [-149.826971, 61.103028] },
      { id: 7,  name: 'NRS-07',  coordinates: [-149.784697, 61.565751] },
      { id: 8,  name: 'NRS-08',  coordinates: [-156.764402, 71.301283] },
      { id: 9,  name: 'NRS-09',  coordinates: [-145.755381, 60.557551] },
      { id: 10, name: 'NRS-10', coordinates: [-145.71551, 63.97385] },
      { id: 11, name: 'NRS-11', coordinates: [-148.005019, 64.845017] },
      { id: 12, name: 'NRS-12', coordinates: [-149.566302, 61.328618] },
      { id: 13, name: 'NRS-13', coordinates: [-147.69252, 64.848852] },
      { id: 14, name: 'NRS-14', coordinates: [-147.616731, 64.960351] },
      { id: 15, name: 'NRS-15', coordinates: [-151.518004, 59.651336] },
      { id: 16, name: 'NRS-16', coordinates: [-149.756247, 61.262426] },
      { id: 17, name: 'NRS-17', coordinates: [-152.364538, 57.810533] },
      { id: 18, name: 'NRS-18', coordinates: [-162.60521, 66.893464] },
      { id: 19, name: 'NRS-19', coordinates: [-147.394019, 64.756959] },
      { id: 20, name: 'NRS-20', coordinates: [-149.110521, 61.59797] },
      { id: 21, name: 'NRS-21', coordinates: [-149.88576, 61.217164] },
      { id: 22, name: 'NRS-22', coordinates: [-151.072077, 60.502525] },
      { id: 23, name: 'NRS-23', coordinates: [-150.077214, 62.297944] },
      { id: 24, name: 'NRS-24', coordinates: [-148.681525, 60.776993] },
      { id: 25, name: 'NRS-25', coordinates: [-148.916989, 63.730808] },
      { id: 26, name: 'NRS-26', coordinates: [-135.888484, 58.455147] },
      { id: 27, name: 'NRS-27', coordinates: [-149.439676, 60.116227] },
      { id: 28, name: 'NRS-28', coordinates: [-151.073069, 60.464726] },
      { id: 29, name: 'NRS-29', coordinates: [-149.104442, 60.971207] },
      { id: 30, name: 'NRS-30', coordinates: [-151.244673, 60.334205] }
    ];

    const stationGeoJSON = {
      type: 'FeatureCollection',
      features: stations.map(station => ({
        type: 'Feature',
        geometry: {
          type: 'Point',
          coordinates: station.coordinates
        },
        properties: {
          id: station.id,
          name: station.name,
          latitude: station.coordinates[1].toFixed(6),
          longitude: station.coordinates[0].toFixed(6)
        }
      }))
    };

    function featureCollectionFromDistance(distanceKm) {
      return turf.featureCollection(
        stations.map(station => turf.buffer(turf.point(station.coordinates), distanceKm, { units: 'kilometers', steps: 64 }))
      );
    }

    function dissolveCollection(collection) {
      const features = collection.features.filter(Boolean);
      if (!features.length) return turf.featureCollection([]);

      let merged = features[0];
      for (let i = 1; i < features.length; i += 1) {
        try {
          merged = turf.union(merged, features[i]) || merged;
        } catch (error) {
          console.warn('Union fallback on feature', i, error);
        }
      }

      if (!merged) return turf.featureCollection([]);
      return turf.featureCollection([merged]);
    }

    function polygonize(feature) {
      if (!feature) return turf.featureCollection([]);
      if (feature.geometry.type === 'Polygon' || feature.geometry.type === 'MultiPolygon') {
        return turf.featureCollection([feature]);
      }
      return turf.featureCollection([]);
    }

    function cleanDifference(outerFC, innerFC) {
      const outerFeature = outerFC.features[0];
      const innerFeature = innerFC.features[0];
      if (!outerFeature) return turf.featureCollection([]);
      if (!innerFeature) return turf.featureCollection([outerFeature]);
      try {
        const diff = turf.difference(outerFeature, innerFeature);
        return polygonize(diff);
      } catch (error) {
        console.warn('Difference failed', error);
        return turf.featureCollection([outerFeature]);
      }
    }

    const merged10 = dissolveCollection(featureCollectionFromDistance(10));
    const merged20 = dissolveCollection(featureCollectionFromDistance(20));
    const merged30 = dissolveCollection(featureCollectionFromDistance(30));

    const band0to10 = merged10;
    const band10to20 = cleanDifference(merged20, merged10);
    const band20to30 = cleanDifference(merged30, merged20);

    const bounds = new mapboxgl.LngLatBounds();
    stations.forEach(station => bounds.extend(station.coordinates));
    if (merged30.features[0]) {
      const [minX, minY, maxX, maxY] = turf.bbox(merged30.features[0]);
      bounds.extend([minX, minY]);
      bounds.extend([maxX, maxY]);
    }

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/standard',
      center: [-149.4937, 64.2008],
      zoom: 3.2,
      pitch: 0,
      attributionControl: false
    });

map.on('style.load', () => {
  map.setConfigProperty('basemap', 'lightPreset', 'dusk');
});

    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    const STATION_ICON_PATH = './tower-icon.png';

    map.on('load', () => {
      map.fitBounds(bounds, { padding: 70, duration: 0, maxZoom: 5.4 });

      map.addSource('coverage-0-10', { type: 'geojson', data: band0to10 });
      map.addSource('coverage-10-20', { type: 'geojson', data: band10to20 });
      map.addSource('coverage-20-30', { type: 'geojson', data: band20to30 });
      map.addSource('stations', { type: 'geojson', data: stationGeoJSON });

      map.addLayer({
        id: 'coverage-20-30-fill',
        type: 'fill',
        source: 'coverage-20-30',
        paint: {
          'fill-color': '#e16b3f',
          'fill-opacity': 0.42
        }
      });

      map.addLayer({
        id: 'coverage-20-30-glow',
        type: 'line',
        source: 'coverage-20-30',
        paint: {
          'line-color': '#ee7a4f',
          'line-width': 22,
          'line-opacity': 0.22,
          'line-blur': 9
        }
      });

      map.addLayer({
        id: 'coverage-10-20-fill',
        type: 'fill',
        source: 'coverage-10-20',
        paint: {
          'fill-color': '#e4c94f',
          'fill-opacity': 0.48
        }
      });

      map.addLayer({
        id: 'coverage-10-20-glow',
        type: 'line',
        source: 'coverage-10-20',
        paint: {
          'line-color': '#f0d45a',
          'line-width': 20,
          'line-opacity': 0.20,
          'line-blur': 8
        }
      });

      map.addLayer({
        id: 'coverage-0-10-fill',
        type: 'fill',
        source: 'coverage-0-10',
        paint: {
          'fill-color': '#2fb35b',
          'fill-opacity': 0.58
        }
      });

      map.addLayer({
        id: 'coverage-0-10-glow',
        type: 'line',
        source: 'coverage-0-10',
        paint: {
          'line-color': '#4ec66f',
          'line-width': 18,
          'line-opacity': 0.22,
          'line-blur': 7
        }
      });

      const towerImage = new Image(96, 96);
      towerImage.onload = () => {
        if (!map.hasImage('tower-icon')) {
          map.addImage('tower-icon', towerImage, { pixelRatio: 2 });
        }

        map.addLayer({
          id: 'station-pins',
          type: 'symbol',
          source: 'stations',
          layout: {
            'icon-image': 'tower-icon',
            'icon-size': [
  'interpolate', ['linear'], ['zoom'],
  3, 0.45,
  5, 0.70,
  7, 1.05,
  9, 1.55,
  11, 2.1,
  13, 2.8,
  15, 3.6,
            'icon-allow-overlap': true,
            'icon-ignore-placement': true
          }
        });

        map.addLayer({
          id: 'station-labels',
          type: 'symbol',
          source: 'stations',
          layout: {
            'text-field': ['get', 'name'],
            'text-font': ['DIN Pro Medium', 'Arial Unicode MS Bold'],
            'text-size': [
              'interpolate', ['linear'], ['zoom'],
              4, 10,
              7, 12,
              10, 14,
              13, 16
            ],
            'text-offset': [0, 1.6],
            'text-anchor': 'top',
            'text-allow-overlap': true
          },
          paint: {
            'text-color': '#f4f8ff',
            'text-halo-color': 'rgba(9,20,35,0.92)',
            'text-halo-width': 1.4
          }
        });

        const popup = new mapboxgl.Popup({ closeButton: true, closeOnClick: true, offset: 18 });

        map.on('click', 'station-pins', (e) => {
          const feature = e.features && e.features[0];
          if (!feature) return;

          const coords = feature.geometry.coordinates.slice();
          const props = feature.properties;

          popup
            .setLngLat(coords)
            .setHTML(
              '<div class="popup-title">' + props.name + '</div>' +
              '<div class="popup-copy">Network reference station<br>Lat: ' + props.latitude + '<br>Lng: ' + props.longitude + '</div>'
            )
            .addTo(map);
        });

        map.on('mouseenter', 'station-pins', () => {
          map.getCanvas().style.cursor = 'pointer';
        });

        map.on('mouseleave', 'station-pins', () => {
          map.getCanvas().style.cursor = '';
        });
      };

      towerImage.onerror = () => {
        console.error('Station PNG failed to load. Make sure tower-icon.png is in the repo root next to index.html');
      };

      towerImage.src = STATION_ICON_PATH;
    });
  </script>
</body>
</html>
